name: Release

on:
  push:
    tags:
      - "v*"
  # Allow other workflows (e.g. auto-release.yml) to invoke this build+release
  # job directly. A tag pushed with the default GITHUB_TOKEN does NOT trigger
  # the `push: tags` event above, so the scheduled auto-tagger calls us here
  # instead of relying on the tag push to kick off a release.
  workflow_call:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the package version from git history, so we need
          # the full history (including tags) — not a shallow clone.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
